[General]
; TL2TrueControlerSupport v0.0.9 is an independent companion.
; It does not load through TL2TrueKeyboardMove.dll or MSWSOCK.dll.
Enable=1
ControllerIndex=0
PollIntervalMs=8
FocusRequired=1
; Best-effort DirectInput exclusive lock while Torchlight2.exe has focus.
; XInput is still used for reading the controller.
AcquireControllerExclusive=1
SuspendWhileOverlayVisible=1
; AUTO reads TL2TrueKeyboardMove.ini next to Torchlight2.exe.
; Use an absolute path only for testing a different profile.
MovementProfileIni=TL2TrueKeyboardMove.ini
; AUTO scans the current Windows user's Documents folder.
; It checks Documents\My Games\runic games\torchlight 2\KeyBindings.dat first,
; then Documents\My Games\runic games\torchlight 2\save\*\KeyBindings.dat.
KeyBindingsDat=AUTO

[Recovery]
; Any real keyboard/mouse input immediately releases controller-owned keys/buttons
; for this window so the normal keyboard/mouse controls can take over.
EnablePhysicalKeyboardMouseOverride=1
PhysicalOverrideMs=1200
; Steam Input can echo gamepad activity as keyboard/mouse events.
; Ignore those echoes briefly after direct gamepad activity.
IgnorePhysicalAfterGamepadMs=350
; Hold Back+Start on the controller to release all controller-owned input.
EnableBackStartReleaseCombo=1
BackStartSuspendMs=2500

[Movement]
LeftStickEnabled=1
FollowKeyboardProfile=1
Deadzone=7849
ActivationThresholdX1000=350
ReleaseThresholdX1000=250

[Mouse]
; Mandatory behavior: right stick moves the real Windows mouse cursor.
RightStickMouse=1
Deadzone=8689
SensitivityX=14
SensitivityY=14
InvertY=0
; R3 toggles between relative cursor mode and radial aim mode.
; Radial aim places the real cursor on a smaller circle around the game window center.
; By default, releasing the stick keeps the last aimed cursor position/direction instead of snapping to center.
; Fixed radius makes radial aim stick to the outer ring instead of scaling cursor distance by stick pressure.
; Radial activation/release thresholds apply only to radial aim and prevent stick snapback from changing aim.
RadialRadius=140
RadialCenterOffsetX=0
RadialCenterOffsetY=0
RadialReturnToCenter=0
RadialUseFixedRadius=1
RadialActivationThresholdX1000=450
RadialReleaseThresholdX1000=300

[Buttons]
; Button values can be:
; - None
; - MouseLeft, MouseRight, MouseMiddle, MouseX1, MouseX2
; - Any supported key name: A-Z, 0-9, Space, Tab, Escape, Enter, Shift, Ctrl, Alt, F1-F12, Up/Down/Left/Right, VKxx, or decimal VK code
; - A key combo: Ctrl+F, Shift+Tab, Alt+Enter
; - A Torchlight II action resolved from KeyBindings.dat: Game:INVENTORYMENU, Game:SKILLMENU, Game:QK1, Game:WEAPONSWAP
; - A gamepad chord on the left side: LeftTrigger+A=Game:QK9
TriggerThreshold=30
A=Game:MOVE/ATTACK
B=Game:CASTSKILL
X=Game:QK5
Y=Game:QK6
LeftShoulder=Game:WEAPONSWAP
RightShoulder=None
Back=Game:AUTOMAP
Start=Game:OPTIONSMENU
LeftThumb=Game:HOLDPOSITION
RightThumb=Addon:ToggleRightStickMouseMode
DPadUp=Game:QK3
DPadRight=Game:QK2
DPadDown=Game:QK4
DPadLeft=Game:QK1
LeftTrigger=None
RightTrigger=Game:QK8
LeftTrigger+A=Game:QK9
LeftTrigger+X=None
LeftTrigger+B=Game:QK0
LeftTrigger+Y=None
RightShoulder+DPadUp=Game:SKILLMENU
RightShoulder+DPadRight=Game:INVENTORYMENU
RightShoulder+DPadDown=Game:QUESTMENU
RightShoulder+DPadLeft=Game:PETMENU
RightShoulder+Y=None
RightShoulder+B=Game:CLOSEALL
RightShoulder+A=Game:SHOWITEMS
