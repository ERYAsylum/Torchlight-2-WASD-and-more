[General]
ConfigRevision=17


[Overlay]
; The overlay now dims the complete Torchlight II client area instead of drawing a fixed box.
; TextScaleMode: 0=Auto by game resolution, 1=Normal, 2=Large, 3=Extra large.
; F5 cycles this setting while the overlay is visible and saves it immediately.
TextScaleMode=0
; Whole-window opacity. Valid range: 160-255.
Opacity=242
; The startup overlay is delayed until the game client/fullscreen rectangle is stable.
ShowAtStartup=1
StartupDelayMs=800
GeometryStableMs=250
; Geometry changes are debounced so fullscreen transitions do not make the overlay pop in/out.
RepositionDebounceMs=200
; Optional integrated D3D9 in-frame overlay mirror for OBS Game Capture.
; Implemented inside TL2TrueKeyboardMove.dll; no extra d3d9.dll is required.
EnableD3D9FrameOverlay=1
; 1 hides the topmost Windows overlay once the D3D9 mirror is active.
HideWindowOverlayWhenD3D9FrameOverlayActive=1

[Keys]
; TL2_WASD_and_more v1.0.02z1 author: ERY_Asylum.
; Warning: unofficial DLL mod; use at your own risk.
; AUTO follows the active Windows keyboard layout and is recommended.
; It automatically becomes ZQSD on French AZERTY and WASD on common QWERTY/QWERTZ layouts.
; Preset can be AUTO, ARROWS, or CUSTOM.
; Press END in game to open or close the overlay.
; Press F5 while the overlay is visible to cycle Auto, Normal, Large and Extra large text.
; Press F6 in game while the overlay is visible to toggle the keyboard/mouse movement patch.
; Press F7 in game while the overlay is visible to toggle left-click movement.
; Press F8 in game while the overlay is visible to toggle active range x1.5.
; Press F9 in game while the overlay is visible to recalibrate the camera movement basis.
; Press F10 in game, with or without the overlay, to force the bounded emergency WASD bootstrap.
Preset=AUTO
BindingMode=PHYSICAL
HoldPosition=SHIFT
Left=A
Up=W
Right=D
Down=S
ScanLeft=30
ScanUp=17
ScanRight=32
ScanDown=31

[KeyboardMousePatch]
EnableKeyboardMousePatch=1

[Mouse]
; 1 removes click-to-move while preserving attacks, pickups, interactions, aiming and menus.
DisableClickMovement=1

[Developer]
ReleaseBrakeMode=1
ReleaseBrakeDelayMs=85
KeyboardMoveMinSendIntervalMs=80
KeyboardMoveRepeatMs=95
KeyboardMoveLeadStepX100=200

[ContextCapture]
; Stable event architecture:
; 1. UNetSetLevelMsg clears the previous map identity.
; 2. The exact UNetSetRunningMsg vtable arms a bounded capture pump.
; 3. The game-window thread samples the direct controller chain every 50 ms.
; 4. The same controller/player/arg1 must be observed for several timed samples.
; 5. Sampling stops completely after the player identity is locked for the map.
;
; The UI lifecycle probe is no longer required for normal operation. The previous
; A legacy UI probe generated hundreds of synchronous file writes on the game thread and
; caused freezes. It remains available only as an opt-in diagnostic.
EnableEventDrivenCapture=1
RequireSetRunningBeforeCapture=1
UseExactSetRunningVftableOnly=1
MinimumCaptureAgeAfterSetRunningMs=100

; Normal capture starts from SetRunning. UI and PlayerCam are optional diagnostics.
RequireUiReadyBeforeCapture=0
RequirePlayerCamBeforeCapture=0
EnableUiLifecycleProbe=0
CaptureOnMapTitleText=1
CaptureOnLoadingHidden=1
CaptureOnHudVisible=0
MapTitleWindowContains=
AllowPlayerCamFallback=0
PlayerCamFallbackDelayMs=8000

; Rejects the characteristic loading/menu placeholder where arg1 is allocated very
; close to self (typically about 0x1F800 bytes away in the observed logs).
RejectAdjacentLoadingContext=1
AdjacentLoadingContextMaxDistance=262144

; The capture pump is active only between SetRunning and a successful lock.
; Samples are deliberately spaced: no callback is allowed to repost itself.
CapturePollIntervalMs=50
StableFramesRequired=3
CaptureTimeoutMs=10000
RequireStrictPlayerMarkerAtCapture=0

; Player identity remains fixed until the next UNetSetLevelMsg. arg1 is resolved from
; that same controller only when a movement command is dispatched.
LockPlayerIdentityOnly=1
ResolveArg1AtDispatch=1
DynamicArg1StableReadsRequired=2
DynamicArg1SettleMs=60
PreserveLockedPlayerAcrossRuntimeDips=1

; Keep these disabled. They restore the older permanent scan/reacquisition model.
ContinuousControllerScan=0
RuntimeReacquire=0
LocalMoveCanRefreshContext=0

; Bounded recovery for new-game sequences which replace the player object after the
; event-driven lock. It activates only while a movement key is held and the locked
; ownership can no longer be resolved. Direct controller samples run on the game
; window thread, must remain stable, and stop immediately after recovery or release.
EnableWasdOwnershipRecovery=1
WasdOwnershipRecoveryWindowMs=3000
WasdOwnershipRecoveryPollMs=50
WasdOwnershipRecoveryStableReads=3
; If one bounded window expires, a held movement key may arm another after this delay.
WasdOwnershipRecoveryRetryDelayMs=250
; A confirmed vanilla player LocalMove (for example after a click-to-move command)
; may identify a replacement controller, but it is still verified by direct samples.
UseConfirmedVanillaMoveAsRecoveryEvidence=1

; Emergency bootstrap for playable maps which appear without a preceding SetLevel event.
; This is the pattern observed on a fresh process when a new game or its first map is
; entered through the intro-video path: SetRunning and a valid player chain exist, but
; no event generation was created, so the normal ownership recovery cannot start.
;
; The detector is automatic and bounded. It first validates the SetRunning message core
; as a controller, then reuses the normal game-thread capture pump and stable samples.
; If that source is not yet valid, a confirmed vanilla player LocalMove can replace it.
; It stops after a lock or timeout and is rearmed only by another orphan SetRunning, a
; held movement key without a structural lock, or the manual F10 fallback.
EnableEmergencyWasdBootstrap=1
AutoBootstrapOnSetRunningWithoutLevel=1
UseSetRunningCoreAsEmergencyController=1
UseVanillaMoveAsEmergencyBootstrapEvidence=1
EmergencyWasdBootstrapWindowMs=30000
EmergencyWasdBootstrapRetryDelayMs=500
; F10 always restarts the bounded emergency bootstrap.
; Turning the keyboard/mouse patch off then on with F6 now does the same.
; Vanilla player identity is validated through the controller chain, not class/pet marker fields.

ClearContextOnSetLevel=1

[CameraSync]
; Provisional loading-camera + bounded runtime-transition architecture:
; 1. The player movement context is locked after loading and -45 degrees remains the
;    explicit provisional fallback.
; 2. The first PlayerCam value may still represent the loading camera. It is applied
;    immediately when valid, but it never contributes to the 2/2 runtime confidence.
; 3. ZQSD/WASD is available by default. The first successful keyboard movement arms
;    a short bounded transition watch which reuses the existing per-dispatch arg1 check.
; 4. If arg1 is promoted, PlayerCam is reacquired immediately while the movement key may
;    remain held. No isolated pause and no permanent controller scan are added.
; 5. If no promotion appears before the bounded window expires, the current arg1 is
;    treated as runtime-stable and one runtime PlayerCam observation is acquired anyway.
; 6. The first runtime observation is applied immediately at confidence 1/2. A later
;    completed movement/release supplies the concordant 2/2 confirmation.
EnableAfterContextLock=1
DelayAfterContextLockMs=100
SampleIntervalMs=50
; StableSamplesRequired validates one engine observation internally. Two separate
; runtime observations are still required before the basis becomes confirmed.
StableSamplesRequired=3
; 35 means 0.35 degree. It is used both inside an observation and between observations.
AngleToleranceDegreesX100=35
TimeoutMs=2000

; Disabled by default. The loading-camera observation is not authoritative,
; so blocking movement for it only adds latency on maps which promote arg1 later.
; These keys remain available for conservative testing and compatibility.
BlockKeyboardUntilFirstEngineObservation=0
BlockKeyboardUntilReady=0
InitialObservationTimeoutMs=2000
AllowProvisionalFallbackAfterTimeout=1

; Bounded post-first-move transition watch. This does not enable the old continuous
; controller scan: it relies on the dynamic arg1 validation already performed when
; LocalMove commands are dispatched.
EnablePostFirstMoveTransitionWatch=1
PostFirstMoveTransitionWatchMs=2000
RuntimeTransitionAcquireTimeoutMs=2000
; If the first runtime samples still equal the pre-transition angle, hold acceptance
; briefly so delayed camera promotion can appear before the same angle is accepted.
RuntimeTransitionSameAngleHoldMs=500

; Continue release-triggered bounded tests only after a runtime movement context has
; been established, until two runtime engine observations are concordant.
VerifyAfterFirstKeyboardRelease=1
VerificationDelayAfterReleaseBrakeMs=10
PostReleaseContextPollMs=50
PostReleaseContextTimeoutMs=2000
PostReleaseStableReadsRequired=2
PostReleaseQuietMs=300
VerificationTimeoutMs=2000
; 0 keeps controls responsive. Only the release-confirmation pass is cancelled when a
; new movement starts; the post-first-move runtime pass is allowed to finish while held.
BlockKeyboardDuringVerification=0

[InteractionFacing]
; NPCs and other click interactions deliberately turn the player toward their target.
; In vanilla, the next movement click clears that target. Keyboard LocalMove bypasses
; the click controller, so without this reset the idle pose can keep looking at the NPC.
; 1 reproduces only the safe target-clearing part of the next vanilla click when a
; new keyboard movement starts. The interaction itself keeps its normal facing.
ResetOnKeyboardMoveStart=1
; Vanilla clears both the primary target (+0x320) and secondary target (+0x328).
ClearSecondaryTarget=1

[MovementDispatch]
; The keyboard worker only reads input and queues commands.
; LocalMove is executed by the Torchlight II game-window thread.
DispatchOnGameWindowThread=1
AllowWorkerThreadLocalMove=0
QueueLatestInputOnly=1
MaxQueuedCommandAgeMs=250
RequireGameWindowThread=1

; The old d1A8 marker is optional and disabled by default because skills and forced
; movement legitimately toggle it. Enable it only for conservative diagnostics.
RequireStrictPlayerMarkerAtDispatch=0

; Crash preflight derived from Torchlight2.exe+0x136150..+0x13618E.
; It rejects the exact null dispatch-list state seen in the crash dump without
; destroying the event-locked player identity.
ValidateSelfDispatchList=1
DispatchListOffset=1712
DispatchListMaxEntries=128

[Diagnostics]
EnableMemoryWatchdog=0
EnableTransitionDiagnostics=0
EnableTransitionMessageHook=1
; PlayerCam rendering remains diagnostic; normal axis synchronization is controlled by [CameraSync].
EnableMapRenderReadyProbe=0
; Legacy master switch kept for compatibility. [CameraSync] enables the normal automatic path.
EnableCameraAutoCalibration=0
EnableOgreLogLoadSignals=0
LogThreadAffinity=0
LogContextCapture=1

; Disabled in normal builds. Enabling the UI probe adds overhead on the main
; game thread. Diagnostic mode rate-limits and caps these entries.
LogUiLifecycle=0
LogAllUiTextDuringLoad=0

[EnginePatch]
EnableActiveRangePatch=1
